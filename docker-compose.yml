services:
  api:
    image: ghcr.io/saleor/saleor:3.22
    ports:
      - 10.0.0.218:8000:8000
    restart: unless-stopped
    networks:
      - saleor-backend-tier
      - digidex-net
    stdin_open: true
    tty: true
    depends_on:
      - db
      - cache
      - jaeger
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
    env_file:
      - common.env
      - backend.env
    environment:
      - DASHBOARD_URL=http://10.0.0.218:9000/
      - ALLOWED_HOSTS=localhost,127.0.0.1,api,10.0.0.218,api.localhost,api.digidex.bio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.saleor-api.rule=Host(`api.digidex.bio`)"
      - "traefik.http.routers.saleor-api.entrypoints=websecure"
      - "traefik.http.routers.saleor-api.tls=true"
      - "traefik.http.routers.saleor-api.tls.certresolver=le"
      - "traefik.http.services.saleor-api.loadbalancer.server.port=8000"

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:latest
    ports:
      - 10.0.0.218:9000:80
    restart: unless-stopped
    networks:
      - digidex-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.saleor-dashboard.rule=Host(`admin.digidex.bio`)"
      - "traefik.http.routers.saleor-dashboard.entrypoints=websecure"
      - "traefik.http.routers.saleor-dashboard.tls=true"
      - "traefik.http.routers.saleor-dashboard.tls.certresolver=le"
      - "traefik.http.services.saleor-dashboard.loadbalancer.server.port=80"

  db:
    image: library/postgres:15-alpine
    ports:
      - 10.0.0.218:5432:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
      - ./replica_user.sql:/docker-entrypoint-initdb.d/replica_user.sql:ro,z
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor

  cache:
    image: valkey/valkey:8.1-alpine
    ports:
      - 10.0.0.218:6379:6379
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-cache:/data

  worker:
    image: ghcr.io/saleor/saleor:3.22
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    env_file:
      - common.env
      - backend.env
    depends_on:
      - cache
      - mailpit
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media

  jaeger:
    image: jaegertracing/jaeger
    ports:
      - "10.0.0.218:16686:16686"
      - "10.0.0.218:4317:4317"
      - "10.0.0.218:4318:4318"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - type: tmpfs
        target: /tmp

  mailpit:
    image: axllent/mailpit
    ports:
      - 10.0.0.218:1025:1025 # smtp server
      - 10.0.0.218:8025:8025 # web ui. Visit http://localhost:8025/ to check emails
    restart: unless-stopped
    networks:
      - saleor-backend-tier

volumes:
  saleor-db:
    driver: local
  saleor-cache:
    driver: local
  saleor-media:

networks:
  saleor-backend-tier:
    driver: bridge
  digidex-net:
    external: true
